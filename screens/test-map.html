<!doctype html>
<html>
  <head>
    <title>Neon Map Test</title>
    <style>
      #map {
        height: 100vh;
        width: 100%;
      }
    </style>
  </head>

  <body>
    <div id="map"></div>

    <script>
      function initMap() {
        const melbourne = { lat: -37.8136, lng: 144.9631 };

        const retroStyle = [
          { elementType: "geometry", stylers: [{ color: "#0a0a1a" }] },
          { elementType: "labels.text.fill", stylers: [{ color: "#00ffff" }] },
          {
            featureType: "road",
            elementType: "geometry",
            stylers: [{ color: "#ff00ff" }],
          },
          {
            featureType: "water",
            elementType: "geometry",
            stylers: [{ color: "#220033" }],
          },
        ];

        const map = new google.maps.Map(document.getElementById("map"), {
          zoom: 14,
          center: melbourne,
          styles: retroStyle,
        });

        new google.maps.Marker({
          position: melbourne,
          map: map,
          title: "Test Marker",
        });
      }
    </script>

    <script
      async
      src="https://maps.googleapis.com/maps/api/js?key=INSERTAPIKEY&callback=initMap"
    ></script>
  </body>
</html>
